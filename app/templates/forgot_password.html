{% extends "base.html" %}
{% set active_nav = "auth" %}

{% block page_title %}忘记密码{% endblock %}

{% block page_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
    <main class="panel-card auth-form-container">
        <section class="auth-form-card">
            <h2>忘记密码</h2>
            <p class="form-desc">请选择一种方式找回密码</p>

            <div class="forgot-options-grid">
                <div class="forgot-option-item">
                    <h3>人脸找回</h3>
                    <p class="option-desc">使用已录入的人脸特征验证身份</p>
                    <a href="{{ url_for('auth.forgot_password_face_page') }}" class="btn btn-primary btn-wide">选择人脸找回</a>
                </div>

                <div class="forgot-option-item">
                    <h3>指纹找回</h3>
                    <p class="option-desc">使用已录入的指纹特征验证身份</p>
                    <a href="{{ url_for('auth.forgot_password_fingerprint_page') }}" class="btn btn-primary btn-wide">选择指纹找回</a>
                </div>
            </div>

            <div class="form-footer">
                <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">返回登录</a>
            </div>
        </section>
    </main>
{% endblock %}
