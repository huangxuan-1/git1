{% extends "base.html" %}
{% set active_nav = "auth" %}

{% block page_title %}重置密码{% endblock %}

{% block page_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
    <main class="panel-card auth-form-container">
        <section class="auth-form-card">
            <h2>重置密码</h2>
            <p class="form-desc">请设置新的登录密码</p>

            <form method="post" action="{{ url_for('auth.forgot_password_reset_page') }}" class="auth-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label for="new_password">新密码</label>
                    <input type="password" id="new_password" name="new_password" required
                           placeholder="请输入新密码（至少6位）" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="confirm_password">确认新密码</label>
                    <input type="password" id="confirm_password" name="confirm_password" required
                           placeholder="请再次输入新密码" autocomplete="new-password">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-wide">确认重置</button>
                </div>

                <div class="form-footer">
                    <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">返回登录</a>
                </div>
            </form>
        </section>
    </main>
{% endblock %}
