{% extends "base.html" %}
{% set active_nav = "auth" %}

{% block page_title %}人脸找回密码{% endblock %}

{% block page_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mfa.css') }}">
{% endblock %}

{% block content %}
    <main class="panel-card auth-form-container">
        <section class="auth-form-card">
            <h2>人脸找回密码</h2>
            <p class="form-desc">请输入账号信息并采集人脸进行验证</p>

            <form method="post" action="{{ url_for('auth.forgot_password_face_page') }}" class="auth-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label for="customer_id">用户ID</label>
                    <input type="text" id="customer_id" name="customer_id" required
                           maxlength="5" inputmode="numeric" pattern="^\d{5}$"
                           placeholder="请输入5位用户ID">
                </div>

                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required
                           maxlength="50" placeholder="请输入用户名">
                </div>

                <div class="camera-section">
                    <div class="camera-toolbar">
                        <button type="button" class="btn btn-secondary" id="camera-start">开启摄像头</button>
                        <button type="button" class="btn btn-secondary" id="camera-stop">关闭摄像头</button>
                    </div>

                    <video id="camera-video" autoplay playsinline></video>

                    <button type="button" class="btn btn-primary" id="capture-btn" disabled>采集人脸图像</button>

                    <div class="preview-box" id="face-preview">
                        <img id="face_preview_img" alt="人脸预览">
                        <span class="preview-placeholder">点击采集人脸图像</span>
                    </div>
                </div>

                <input type="hidden" id="liveness_image_data" name="liveness_image_data">

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-wide" id="submit-btn" disabled>验证人脸</button>
                </div>

                <div class="form-footer">
                    <a href="{{ url_for('auth.forgot_password_page') }}" class="btn btn-secondary">返回选择方式</a>
                    <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">返回登录</a>
                </div>
            </form>
        </section>
    </main>
{% endblock %}

{% block page_js %}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.getElementById('camera-video');
            const startBtn = document.getElementById('camera-start');
            const stopBtn = document.getElementById('camera-stop');
            const captureBtn = document.getElementById('capture-btn');
            const submitBtn = document.getElementById('submit-btn');
            const faceImg = document.getElementById('face_preview_img');
            const placeholder = faceImg.parentElement.querySelector('.preview-placeholder');
            const dataInput = document.getElementById('liveness_image_data');

            let stream = null;

            startBtn.addEventListener('click', async function() {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 360 } }
                    });
                    video.srcObject = stream;
                    captureBtn.disabled = false;
                } catch (err) {
                    alert('无法开启摄像头: ' + err.message);
                }
            });

            stopBtn.addEventListener('click', function() {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    stream = null;
                }
                video.srcObject = null;
                captureBtn.disabled = true;
            });

            captureBtn.addEventListener('click', function() {
                if (!video.videoWidth) return;

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);

                const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                faceImg.src = dataUrl;
                faceImg.style.display = 'block';
                if (placeholder) placeholder.style.display = 'none';
                dataInput.value = dataUrl;
                submitBtn.disabled = false;
            });

            window.addEventListener('beforeunload', function() {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
            });
        });
    </script>
{% endblock %}
