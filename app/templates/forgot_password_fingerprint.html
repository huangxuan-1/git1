{% extends "base.html" %}
{% set active_nav = "auth" %}

{% block page_title %}指纹找回密码{% endblock %}

{% block page_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
    <main class="panel-card auth-form-container">
        <section class="auth-form-card">
            <h2>指纹找回密码</h2>
            <p class="form-desc">请输入账号信息并上传指纹照片进行验证</p>

            <form method="post" action="{{ url_for('auth.forgot_password_fingerprint_page') }}" class="auth-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label for="customer_id">用户ID</label>
                    <input type="text" id="customer_id" name="customer_id" required
                           maxlength="5" inputmode="numeric" pattern="^\d{5}$"
                           placeholder="请输入5位用户ID">
                </div>

                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required
                           maxlength="50" placeholder="请输入用户名">
                </div>

                <div class="form-group">
                    <label for="fingerprint_file">指纹照片</label>
                    <input type="file" id="fingerprint_file" name="fingerprint_file" accept="image/*" required
                           onchange="previewFingerprint(event)">
                    <p class="file-tip">支持 JPG、PNG 格式</p>
                </div>

                <div class="preview-box" id="fingerprint-preview">
                    <img id="fingerprint_preview_img" alt="指纹预览">
                    <span class="preview-placeholder">点击上方选择指纹照片</span>
                </div>

                <input type="hidden" id="fingerprint_image_data" name="fingerprint_image_data">

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-wide">验证指纹</button>
                </div>

                <div class="form-footer">
                    <a href="{{ url_for('auth.forgot_password_page') }}" class="btn btn-secondary">返回选择方式</a>
                    <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">返回登录</a>
                </div>
            </form>
        </section>
    </main>
{% endblock %}

{% block page_js %}
    <script>
        function previewFingerprint(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('fingerprint_preview_img');
                const placeholder = img.parentElement.querySelector('.preview-placeholder');
                img.src = e.target.result;
                img.style.display = 'block';
                if (placeholder) placeholder.style.display = 'none';
                document.getElementById('fingerprint_image_data').value = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    </script>
{% endblock %}
